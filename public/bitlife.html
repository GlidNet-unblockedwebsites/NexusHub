<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>BitLife - Life Simulator</title>
    <style>
        body {
            font-family: "Myriad Pro", Myriad, "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            position: absolute;
            height: 100%;
            width: 100%;
            background-color: #333;
            overflow: hidden;
        }
        .webgl-content {
            position: absolute;
            height: 100%;
            width: 100%;
            background: #333;
        }
        #gameContainer {
            position: absolute;
            height: 100%;
            width: 100%;
        }
        canvas {
            position: absolute;
            height: 100%;
            width: 100%;
        }
        .logo {
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            background: url(https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/logo.png) no-repeat center/contain;
            width: 130px;
            height: 130px;
            display: none;
        }
        .progress {
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            height: 18px;
            width: 141px;
            margin-top: 90px;
        }
        .progress .empty {
            background: url(https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/TemplateData/progressEmpty.Dark.png) no-repeat right/cover;
            float: right;
            width: 100%;
            height: 100%;
            display: inline-block;
        }
        .progress .full {
            background: url(https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/TemplateData/progressFull.Dark.png) no-repeat left/cover;
            float: left;
            width: 0%;
            height: 100%;
            display: inline-block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/TemplateData/UnityProgress.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/UnityLoader.js"></script>
    <script>
        window.onload = function() {
            var gameContainer = document.getElementById("gameContainer");
            var unityInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/games/bitlife/Build/BitLife.json", {
                onProgress: UnityProgress
            });
        };
    </script>
</head>
<body>
    <div class="webgl-content">
        <div id="gameContainer"></div>
        <div class="logo Dark"></div>
        <div class="progress Dark">
            <div class="empty"></div>
            <div class="full"></div>
        </div>
    </div>
</body>
</html>
